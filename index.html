<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Smart Home IoT Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
.navbar {
  background: #111827;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.status-pill {
  background: #22c55e;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
}

/* LOGIN */
#loginBox {
  max-width: 350px;
  margin: 100px auto;
  background: #1f2937;
  padding: 25px;
  border-radius: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* DASHBOARD */
#dashboard {
  display: none;
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.device-img {
  width: 60px;
  height: 60px;
}

.value {
  font-size: 20px;
  font-weight: bold;
  margin-top: 8px;
}

/* ALERT */
#alertBox {
  display: none;
  background: #ef4444;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

/* THRESHOLD */
.threshold {
  margin-top: 20px;
  background: #1f2937;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h3>🏠 Smart IoT Dashboard</h3>
  <div class="status-pill">ONLINE</div>
</div>

<!-- ALERT -->
<div id="alertBox"></div>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="grid">

    <div class="card">
      <img class="device-img" src="https://img.icons8.com/fluency/96/temperature.png"/>
      <div>Temperature</div>
      <div class="value" id="temp">--</div>
    </div>

    <div class="card">
      <img class="device-img" src="https://img.icons8.com/fluency/96/humidity.png"/>
      <div>Humidity</div>
      <div class="value" id="hum">--</div>
    </div>

    <div class="card">
      <img class="device-img" src="https://img.icons8.com/fluency/96/fire-element.png"/>
      <div>Fire</div>
      <div class="value" id="flame">--</div>
    </div>

    <div class="card">
      <img class="device-img" src="https://img.icons8.com/fluency/96/burglar.png"/>
      <div>Intruder</div>
      <div class="value" id="intruder">--</div>
    </div>

    <div class="card">
      <img class="device-img" src="https://img.icons8.com/fluency/96/light-on.png"/>
      <div>Light</div>
      <div class="value" id="light">--</div>
    </div>

    <div class="card">
      <img class="device-img" src="https://img.icons8.com/fluency/96/fan.png"/>
      <div>Fan</div>
      <div class="value" id="fan">--</div>
    </div>

  </div>

  <div class="threshold">
    <h3>Set Temperature Threshold</h3>
    <input type="number" id="threshold" placeholder="Enter value">
    <button onclick="setThreshold()">Update</button>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAkPmYePLUJC29NTFn36vcF2IQHyFrwSzg",
  authDomain: "esp-32-smart-iot-using-sensors.firebaseapp.com",
  databaseURL: "https://esp-32-smart-iot-using-sensors-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "esp-32-smart-iot-using-sensors",
  storageBucket: "esp-32-smart-iot-using-sensors.firebasestorage.app",
  messagingSenderId: "895952873687",
  appId: "1:895952873687:web:45da0a4a90d42274052892"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* LOGIN */
const allowedEmail = "krishna.maurya@gmail.com";
const allowedPassword = "9821173589";

function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if (email === allowedEmail && pass === allowedPassword) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    start();
  } else {
    alert("Invalid credentials");
  }
}

/* START */
function start() {

  db.ref("/sensors").on("value", snap => {
    let d = snap.val();
    if (!d) return;

    document.getElementById("temp").innerText = d.temperature + "°C";
    document.getElementById("hum").innerText = d.humidity + "%";
    document.getElementById("flame").innerText = d.flame ? "DETECTED 🔥" : "Safe";
    document.getElementById("intruder").innerText = d.proximity ? "YES 🚨" : "No";
    document.getElementById("light").innerText = d.ldr ? "ON 💡" : "OFF";
  });

  db.ref("/fan").on("value", snap => {
    document.getElementById("fan").innerText = snap.val() ? "ON 🌀" : "OFF";
  });

  db.ref("/alerts").on("value", snap => {
    let a = snap.val();
    if (!a) return;

    if (a.fire) showAlert("🔥 FIRE DETECTED!");
    if (a.intruder) showAlert("🚨 INTRUDER ALERT!");
  });
}

/* ALERT */
function showAlert(msg) {
  let box = document.getElementById("alertBox");
  box.innerText = msg;
  box.style.display = "block";

  setTimeout(() => box.style.display = "none", 4000);
}

/* THRESHOLD */
function setThreshold() {
  let val = document.getElementById("threshold").value;
  db.ref("/thresholds/temperature").set(Number(val));
  alert("Threshold Updated");
}
</script>

</body>
</html>
