<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Smart Home Pro | IoT Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
        }

        .navbar {
            background: #111827;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px var(--accent-green);
        }

        #loginBox {
            max-width: 400px;
            margin: 100px auto;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-blue);
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn-manual { background: #64748b; margin-top: 5px; font-size: 0.8rem; }
        .btn-auto { background: #0369a1; margin-top: 5px; font-size: 0.8rem; }

        #dashboard { display: none; padding: 2rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        /* Class for when fire is detected */
        .card-fire-active {
            background: var(--accent-red) !important;
            border-color: white !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
            transform: scale(1.05);
        }

        .icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .label { color: var(--text-dim); font-size: 0.9rem; text-transform: uppercase; }
        .value { font-size: 1.5rem; font-weight: 700; margin: 0.5rem 0; }
        .mode-label { font-size: 0.7rem; color: var(--accent-blue); font-weight: bold; margin-bottom: 10px; }

        .threshold-section {
            margin-top: 2rem;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            max-width: 400px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div style="font-weight: bold; font-size: 1.2rem;">🏠 SMART HOME CLOUD</div>
    <div><span class="status-dot"></span> LIVE DATA</div>
</div>

<div id="loginBox">
    <h3>Restricted Access</h3>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Enter Dashboard</button>
</div>

<div id="dashboard">
    <div class="grid">
        <div class="card">
            <div class="icon">🌡️</div>
            <div class="label">Temperature</div>
            <div class="value" id="temp">--°C</div>
        </div>

        <div class="card">
            <div class="icon">💧</div>
            <div class="label">Humidity</div>
            <div class="value" id="hum">--%</div>
        </div>

        <!-- Fire Status Card -->
        <div class="card" id="fireCard">
            <div class="icon">🔥</div>
            <div class="label">Fire Status</div>
            <div class="value" id="flame">Safe</div>
        </div>

        <div class="card">
            <div class="icon">🛡️</div>
            <div class="label">Intruder Sensor</div>
            <div class="value" id="intruder">Secure</div>
        </div>

        <div class="card">
            <div class="icon">❄️</div>
            <div class="label">AC Control</div>
            <div class="value" id="fanStatus">OFF</div>
            <div id="fanModeDisplay" class="mode-label">MODE: AUTO</div>
            <button class="btn-auto" onclick="setMode('fan', 'AUTO')">Set Auto</button>
            <button class="btn-manual" onclick="toggleDevice('fan')">Toggle Manual</button>
        </div>

        <div class="card">
            <div class="icon">💡</div>
            <div class="label">Light Control</div>
            <div class="value" id="lightStatus">OFF</div>
            <div id="lightModeDisplay" class="mode-label">MODE: AUTO</div>
            <button class="btn-auto" onclick="setMode('light', 'AUTO')">Set Auto</button>
            <button class="btn-manual" onclick="toggleDevice('light')">Toggle Manual</button>
        </div>
    </div>

    <div class="threshold-section">
        <h3>System Settings</h3>
        <label class="label">Fan Activation Temp (°C)</label>
        <input type="number" id="thresholdInput" placeholder="Enter Value">
        <button onclick="updateThreshold()">Update Threshold</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAkPmYePLUJC29NTFn36vcF2IQHyFrwSzg",
  authDomain: "esp-32-smart-iot-using-sensors.firebaseapp.com",
  databaseURL: "https://esp-32-smart-iot-using-sensors-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "esp-32-smart-iot-using-sensors",
  storageBucket: "esp-32-smart-iot-using-sensors.firebasestorage.app",
  messagingSenderId: "895952873687",
  appId: "1:895952873687:web:45da0a4a90d42274052892"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const USER_EMAIL = "krishna.maurya@gmail.com";
const USER_PASS = "9821173589";

function login() {
    const email = document.getElementById("email").value.trim().toLowerCase();
    const pass = document.getElementById("password").value.trim();

    if (email === USER_EMAIL && pass === USER_PASS) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        initListeners();
    } else {
        alert("Invalid credentials.");
    }
}

function initListeners() {
    db.ref("/sensors").on("value", (snap) => {
        const data = snap.val();
        if (!data) return;
        
        // Update Temp & Humidity
        document.getElementById("temp").innerText = (data.temperature || "--") + "°C";
        document.getElementById("hum").innerText = (data.humidity || "--") + "%";
        
        // Fire Card Logic[cite: 1]
        const isFire = (data.flame === true || data.flame === "true");
        const fireCard = document.getElementById("fireCard");
        const fireValue = document.getElementById("flame");
        
        if (isFire) {
            fireValue.innerText = "🔥 FIRE DETECTED!";
            fireValue.style.color = "white";
            fireCard.classList.add("card-fire-active"); // Highlight card red
        } else {
            fireValue.innerText = "Safe";
            fireValue.style.color = "var(--accent-green)";
            fireCard.classList.remove("card-fire-active"); // Reset card color
        }
        
        // Intruder Logic
        const isIntruder = (data.proximity === true || data.proximity === "true");
        document.getElementById("intruder").innerText = isIntruder ? "🚨 ALERT" : "Secure";
        document.getElementById("intruder").style.color = isIntruder ? "#ef4444" : "#10b981";
    });

    db.ref("/devices/fan").on("value", snap => {
        const status = snap.val();
        const active = (status === true || status === "true");
        document.getElementById("fanStatus").innerText = active ? "ON" : "OFF";
        document.getElementById("fanStatus").style.color = active ? "#10b981" : "#94a3b8";
    });

    db.ref("/devices/light").on("value", snap => {
        const status = snap.val();
        const active = (status === true || status === "true");
        document.getElementById("lightStatus").innerText = active ? "ON" : "OFF";
        document.getElementById("lightStatus").style.color = active ? "#10b981" : "#94a3b8";
    });

    db.ref("/mode").on("value", snap => {
        const m = snap.val();
        if (!m) return;
        document.getElementById("fanModeDisplay").innerText = "MODE: " + (m.fan || "AUTO");
        document.getElementById("lightModeDisplay").innerText = "MODE: " + (m.light || "AUTO");
    });
}

function setMode(device, mode) {
    db.ref("/mode/" + device).set(mode);
}

function toggleDevice(device) {
    db.ref("/mode/" + device).set("MANUAL");
    const ref = db.ref("/devices/" + device);
    ref.once("value").then(snap => {
        ref.set(!snap.val());
    });
}

function updateThreshold() {
    const val = document.getElementById("thresholdInput").value;
    if (val) {
        db.ref("/thresholds/temperature").set(Number(val));
        alert("Threshold Updated!");
    }
}
</script>
</body>
</html>
