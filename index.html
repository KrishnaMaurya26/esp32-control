<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Smart IoT Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
.navbar {
  background: #111827;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

/* LOGIN */
#loginBox {
  max-width: 350px;
  margin: 100px auto;
  background: #1f2937;
  padding: 20px;
  border-radius: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  background: #111827;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* DASHBOARD */
#dashboard {
  display: none;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
}

.device-img {
  width: 55px;
  height: 55px;
}

.value {
  font-size: 18px;
  margin-top: 5px;
  font-weight: bold;
}

/* ALERT */
#alertBox {
  display: none;
  background: #ef4444;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

/* THRESHOLD */
.threshold {
  margin-top: 20px;
  background: #1f2937;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>🏠 Smart IoT</div>
  <div>LIVE</div>
</div>

<!-- ALERT -->
<div id="alertBox"></div>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="grid">

    <div class="card">
      🌡
      <div>Temp</div>
      <div class="value" id="temp">--</div>
    </div>

    <div class="card">
      💧
      <div>Humidity</div>
      <div class="value" id="hum">--</div>
    </div>

    <div class="card">
      🔥
      <div>Fire</div>
      <div class="value" id="flame">--</div>
    </div>

    <div class="card">
      🚨
      <div>Intruder</div>
      <div class="value" id="intruder">--</div>
    </div>

    <div class="card">
      💡
      <div>Light</div>
      <div class="value" id="light">--</div>
    </div>

    <div class="card">
      🌀
      <div>Fan</div>
      <div class="value" id="fan">--</div>
    </div>

  </div>

  <div class="threshold">
    <h3>Set Temperature Threshold</h3>
    <input type="number" id="threshold" placeholder="Enter value">
    <button onclick="setThreshold()">Update</button>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAkPmYePLUJC29NTFn36vcF2IQHyFrwSzg",
  authDomain: "esp-32-smart-iot-using-sensors.firebaseapp.com",
  databaseURL: "https://esp-32-smart-iot-using-sensors-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "esp-32-smart-iot-using-sensors",
  storageBucket: "esp-32-smart-iot-using-sensors.firebasestorage.app",
  messagingSenderId: "895952873687",
  appId: "1:895952873687:web:45da0a4a90d42274052892"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LOGIN */
const allowedEmail = "krishna.maurya@gmail.com";
const allowedPassword = "9821173589";

function login() {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value;

  if (email === allowedEmail && pass === allowedPassword) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    start();
  } else {
    alert("Invalid credentials");
  }
}

/* START REALTIME LISTENERS */
function start() {

  const sensorRef = db.ref("/sensors");

  sensorRef.on("value", (snap) => {

    if (!snap.exists()) {
      console.log("No sensor data found");
      return;
    }

    const d = snap.val();

    document.getElementById("temp").innerText = d.temperature ?? "--";
    document.getElementById("hum").innerText = d.humidity ?? "--";
    document.getElementById("flame").innerText = d.flame ? "DETECTED 🔥" : "Safe";
    document.getElementById("intruder").innerText = d.proximity ? "YES 🚨" : "No";
    document.getElementById("light").innerText = d.ldr ? "ON" : "OFF";
  });

  db.ref("/fan").on("value", snap => {
    document.getElementById("fan").innerText = snap.val() ? "ON 🌀" : "OFF";
  });

  db.ref("/alerts").on("value", snap => {
    const a = snap.val();
    if (!a) return;

    if (a.fire) showAlert("🔥 FIRE ALERT!");
    if (a.intruder) showAlert("🚨 INTRUDER ALERT!");
  });
}

/* ALERT UI */
function showAlert(msg) {
  const box = document.getElementById("alertBox");
  box.innerText = msg;
  box.style.display = "block";

  setTimeout(() => {
    box.style.display = "none";
  }, 4000);
}

/* THRESHOLD FIXED */
function setThreshold() {
  const input = document.getElementById("threshold");

  if (!input) {
    alert("Threshold input missing");
    return;
  }

  if (!input.value) {
    alert("Enter value first");
    return;
  }

  db.ref("/thresholds/temperature").set(Number(input.value));

  alert("Threshold Updated ✔");
}
</script>

</body>
</html>
